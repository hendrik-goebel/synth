<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arpeggio Loop</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="A small Web Audio app that plays an up-and-down arpeggio loop.">

  <meta property="og:title" content="Arpeggio Loop">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>
  <main class="app">
    <p id="status">Stopped</p>
    <div class="global-transport" aria-label="Global transport controls">
      <button id="global-play" type="button" class="transport-btn transport-btn--play" aria-label="Play all">▶</button>
      <button id="global-stop" type="button" class="transport-btn transport-btn--stop" disabled aria-disabled="true" aria-label="Stop all">■</button>
    </div>
    <section class="controls" aria-label="Synth controls">

      <div class="controls-top-row">
        <section class="mixer" aria-label="Audio mixer">
          <div id="mixer-channels" class="mixer-channels"></div>
        </section>
        <section class="controls controls--global controls-global-panel" aria-label="Global settings">

          <div class="control-group control-group--seed">
            <h3 class="control-group-title">Seed</h3>
            <div class="seed-panel" aria-label="Save and load the current state via a seed">
              <label class="seed-label" for="state-seed-input">Current seed</label>
              <textarea
                id="state-seed-input"
                class="seed-input"
                rows="3"
                spellcheck="false"
                autocapitalize="off"
                autocomplete="off"
                autocorrect="off"
                placeholder="Generate a seed, or paste one here to restore a saved state"
              ></textarea>
              <div class="seed-actions">
                <button id="state-seed-save" type="button" class="control-toggle-btn seed-action-btn">Save</button>
                <button id="state-seed-load" type="button" class="control-toggle-btn seed-action-btn">Load</button>
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3 class="control-group-title">Timing</h3>
            <div class="control-group-items">
              <div class="control-item">
                <label for="tempo-bpm">Tempo (<span id="tempo-bpm-value">120</span> BPM)</label>
                <input id="tempo-bpm" type="range" min="60" max="220" step="1" value="120">
              </div>
            </div>
          </div>



          <div class="control-group">
            <h3 class="control-group-title">Tape Delay</h3>
            <div class="control-group-items">
              <div class="control-item">
                <label for="tape-delay-enabled">Enabled (<span id="tape-delay-enabled-value">On</span>)</label>
                <button
                  id="tape-delay-enabled"
                  type="button"
                  class="control-toggle-btn delay-enabled-toggle is-active"
                  value="1"
                  aria-pressed="true"
                >
                  On
                </button>
              </div>
              <div class="control-item">
                <label for="delay-time">Time (<span id="delay-time-value">1/8</span>)</label>
                <input id="delay-time" type="range" min="0" max="7" step="1" value="3">
              </div>
              <div class="control-item">
                <label for="delay-feedback">Feedback (<span id="delay-feedback-value">0.06</span>)</label>
                <input id="delay-feedback" type="range" min="0" max="1" step="0.001" value="0.592717">
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3 class="control-group-title">Clean Delay</h3>
            <div class="control-group-items">
              <div class="control-item">
                <label for="clean-delay-enabled">Enabled (<span id="clean-delay-enabled-value">On</span>)</label>
                <button
                  id="clean-delay-enabled"
                  type="button"
                  class="control-toggle-btn delay-enabled-toggle is-active"
                  value="1"
                  aria-pressed="true"
                >
                  On
                </button>
              </div>
              <div class="control-item">
                <label for="clean-delay-time">Time (<span id="clean-delay-time-value">1/8</span>)</label>
                <input id="clean-delay-time" type="range" min="0" max="7" step="1" value="3">
              </div>
              <div class="control-item">
                <label for="clean-delay-repetitions">Repetitions (<span id="clean-delay-repetitions-value">4 repeats</span>)</label>
                <input id="clean-delay-repetitions" type="range" min="1" max="12" step="1" value="4">
              </div>
            </div>
          </div>

          <div class="control-group">
            <h3 class="control-group-title">Output</h3>
            <div class="control-group-items">
              <div class="control-item">
                <label for="global-timbre">Timbre (<span id="global-timbre-value">Neutral</span>)</label>
                <input id="global-timbre" type="range" min="-1" max="1" step="0.01" value="0">
              </div>
              <div class="control-item">
                <label for="reverb-mix">Reverb Mix (<span id="reverb-mix-value">0.35</span>)</label>
                <input id="reverb-mix" type="range" min="0" max="1" step="0.01" value="0.35">
              </div>
              <div class="control-item">
                <label for="master-volume">Master Volume (<span id="master-volume-value">0.75</span>)</label>
                <input id="master-volume" type="range" min="0" max="1" step="0.01" value="0.75">
              </div>
            </div>
          </div>
        </section>
       <fieldset class="note-selector">
         <legend>Arpeggio Notes (C3–B6)</legend>
         <div class="note-grid-rows" id="note-grid">
           <div class="note-row" data-note-octave="3">
             <div class="note-row-side">
               <button type="button" class="control-toggle-btn note-row-toggle is-active" data-note-octave="3" value="1" aria-pressed="true">On</button>
             </div>
             <div class="note-row-buttons">
               <button id="note-c3" data-note-id="note-c3" type="button" class="note-toggle" aria-pressed="false">C3</button>
               <button id="note-cs3" data-note-id="note-cs3" type="button" class="note-toggle" aria-pressed="false">C#3</button>
               <button id="note-d3" data-note-id="note-d3" type="button" class="note-toggle" aria-pressed="false">D3</button>
               <button id="note-ds3" data-note-id="note-ds3" type="button" class="note-toggle" aria-pressed="false">D#3</button>
               <button id="note-e3" data-note-id="note-e3" type="button" class="note-toggle" aria-pressed="false">E3</button>
               <button id="note-f3" data-note-id="note-f3" type="button" class="note-toggle" aria-pressed="false">F3</button>
               <button id="note-fs3" data-note-id="note-fs3" type="button" class="note-toggle" aria-pressed="false">F#3</button>
               <button id="note-g3" data-note-id="note-g3" type="button" class="note-toggle" aria-pressed="false">G3</button>
               <button id="note-gs3" data-note-id="note-gs3" type="button" class="note-toggle" aria-pressed="false">G#3</button>
               <button id="note-a3" data-note-id="note-a3" type="button" class="note-toggle" aria-pressed="false">A3</button>
               <button id="note-as3" data-note-id="note-as3" type="button" class="note-toggle" aria-pressed="false">A#3</button>
               <button id="note-b3" data-note-id="note-b3" type="button" class="note-toggle" aria-pressed="false">B3</button>
             </div>
           </div>
           <div class="note-row" data-note-octave="4">
             <div class="note-row-side">
               <button type="button" class="control-toggle-btn note-row-toggle is-active" data-note-octave="4" value="1" aria-pressed="true">On</button>
             </div>
             <div class="note-row-buttons">
               <button id="note-c4" data-note-id="note-c4" type="button" class="note-toggle is-active" aria-pressed="true">C4</button>
               <button id="note-cs4" data-note-id="note-cs4" type="button" class="note-toggle" aria-pressed="false">C#4</button>
               <button id="note-d4" data-note-id="note-d4" type="button" class="note-toggle" aria-pressed="false">D4</button>
               <button id="note-ds4" data-note-id="note-ds4" type="button" class="note-toggle" aria-pressed="false">D#4</button>
               <button id="note-e4" data-note-id="note-e4" type="button" class="note-toggle is-active" aria-pressed="true">E4</button>
               <button id="note-f4" data-note-id="note-f4" type="button" class="note-toggle" aria-pressed="false">F4</button>
               <button id="note-fs4" data-note-id="note-fs4" type="button" class="note-toggle" aria-pressed="false">F#4</button>
               <button id="note-g4" data-note-id="note-g4" type="button" class="note-toggle is-active" aria-pressed="true">G4</button>
               <button id="note-gs4" data-note-id="note-gs4" type="button" class="note-toggle" aria-pressed="false">G#4</button>
               <button id="note-a4" data-note-id="note-a4" type="button" class="note-toggle" aria-pressed="false">A4</button>
               <button id="note-as4" data-note-id="note-as4" type="button" class="note-toggle" aria-pressed="false">A#4</button>
               <button id="note-b4" data-note-id="note-b4" type="button" class="note-toggle" aria-pressed="false">B4</button>
             </div>
           </div>
           <div class="note-row" data-note-octave="5">
             <div class="note-row-side">
               <button type="button" class="control-toggle-btn note-row-toggle is-active" data-note-octave="5" value="1" aria-pressed="true">On</button>
             </div>
             <div class="note-row-buttons">
               <button id="note-c5" data-note-id="note-c5" type="button" class="note-toggle" aria-pressed="false">C5</button>
               <button id="note-cs5" data-note-id="note-cs5" type="button" class="note-toggle" aria-pressed="false">C#5</button>
               <button id="note-d5" data-note-id="note-d5" type="button" class="note-toggle" aria-pressed="false">D5</button>
               <button id="note-ds5" data-note-id="note-ds5" type="button" class="note-toggle" aria-pressed="false">D#5</button>
               <button id="note-e5" data-note-id="note-e5" type="button" class="note-toggle" aria-pressed="false">E5</button>
               <button id="note-f5" data-note-id="note-f5" type="button" class="note-toggle" aria-pressed="false">F5</button>
               <button id="note-fs5" data-note-id="note-fs5" type="button" class="note-toggle" aria-pressed="false">F#5</button>
               <button id="note-g5" data-note-id="note-g5" type="button" class="note-toggle" aria-pressed="false">G5</button>
               <button id="note-gs5" data-note-id="note-gs5" type="button" class="note-toggle" aria-pressed="false">G#5</button>
               <button id="note-a5" data-note-id="note-a5" type="button" class="note-toggle" aria-pressed="false">A5</button>
               <button id="note-as5" data-note-id="note-as5" type="button" class="note-toggle" aria-pressed="false">A#5</button>
               <button id="note-b5" data-note-id="note-b5" type="button" class="note-toggle" aria-pressed="false">B5</button>
             </div>
           </div>
           <div class="note-row" data-note-octave="6">
             <div class="note-row-side">
               <button type="button" class="control-toggle-btn note-row-toggle is-active" data-note-octave="6" value="1" aria-pressed="true">On</button>
             </div>
             <div class="note-row-buttons">
               <button id="note-c6" data-note-id="note-c6" type="button" class="note-toggle" aria-pressed="false">C6</button>
               <button id="note-cs6" data-note-id="note-cs6" type="button" class="note-toggle" aria-pressed="false">C#6</button>
               <button id="note-d6" data-note-id="note-d6" type="button" class="note-toggle" aria-pressed="false">D6</button>
               <button id="note-ds6" data-note-id="note-ds6" type="button" class="note-toggle" aria-pressed="false">D#6</button>
               <button id="note-e6" data-note-id="note-e6" type="button" class="note-toggle" aria-pressed="false">E6</button>
               <button id="note-f6" data-note-id="note-f6" type="button" class="note-toggle" aria-pressed="false">F6</button>
               <button id="note-fs6" data-note-id="note-fs6" type="button" class="note-toggle" aria-pressed="false">F#6</button>
               <button id="note-g6" data-note-id="note-g6" type="button" class="note-toggle" aria-pressed="false">G6</button>
               <button id="note-gs6" data-note-id="note-gs6" type="button" class="note-toggle" aria-pressed="false">G#6</button>
               <button id="note-a6" data-note-id="note-a6" type="button" class="note-toggle" aria-pressed="false">A6</button>
               <button id="note-as6" data-note-id="note-as6" type="button" class="note-toggle" aria-pressed="false">A#6</button>
               <button id="note-b6" data-note-id="note-b6" type="button" class="note-toggle" aria-pressed="false">B6</button>
             </div>
           </div>
        </div>
        <div class="note-selector-actions">
          <button id="dead-note-toggle" type="button" class="control-toggle-btn dead-note-toggle" aria-pressed="false" value="0">Pause</button>
          <button id="dead-note-count-toggle" type="button" class="control-toggle-btn dead-note-count-toggle" value="1">Pause Count: 1</button>
          <button
            id="arpeggio-settings-toggle"
            type="button"
            class="control-toggle-btn note-settings-toggle"
            aria-haspopup="dialog"
            aria-controls="arpeggio-settings-dialog"
          >
            Settings
          </button>
        </div>
       </fieldset>

       <dialog id="arpeggio-settings-dialog" class="settings-dialog" aria-labelledby="arpeggio-settings-title">
         <div class="settings-dialog-content">
           <div class="settings-dialog-header">
             <h2 id="arpeggio-settings-title">Arpeggio Settings</h2>
             <button id="arpeggio-settings-close" type="button" class="settings-dialog-close" aria-label="Close settings dialog">×</button>
           </div>
           <section class="settings-dialog-section" aria-labelledby="arpeggio-settings-notes-title">
             <h3 id="arpeggio-settings-notes-title" class="settings-dialog-section-title">Notes</h3>
             <div class="settings-channel-selector" aria-label="Channels that receive applied arpeggio settings">
               <div class="settings-channel-selector-label">Apply to channels</div>
               <div class="settings-channel-button-row" id="arpeggio-settings-channel-buttons">
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="warm" aria-pressed="true" aria-label="Apply to channel 1">1</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="pluck" aria-pressed="true" aria-label="Apply to channel 2">2</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="organ" aria-pressed="true" aria-label="Apply to channel 3">3</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="bass" aria-pressed="true" aria-label="Apply to channel 4">4</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="glass" aria-pressed="true" aria-label="Apply to channel 5">5</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="acid" aria-pressed="true" aria-label="Apply to channel 6">6</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="noisy" aria-pressed="true" aria-label="Apply to channel 7">7</button>
                 <button type="button" class="control-toggle-btn settings-channel-btn is-active" data-settings-channel-id="deep" aria-pressed="true" aria-label="Apply to channel 8">8</button>
               </div>
             </div>
             <div class="settings-note-grid" aria-label="Chromatic note buttons">
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="c" aria-pressed="false">C</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="cs" aria-pressed="false">C#</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="d" aria-pressed="false">D</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="ds" aria-pressed="false">D#</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="e" aria-pressed="false">E</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="f" aria-pressed="false">F</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="fs" aria-pressed="false">F#</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="g" aria-pressed="false">G</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="gs" aria-pressed="false">G#</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="a" aria-pressed="false">A</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="as" aria-pressed="false">A#</button>
               <button type="button" class="note-toggle settings-note-toggle" data-pitch-class-key="b" aria-pressed="false">B</button>
             </div>
           </section>
           <section class="settings-dialog-section" aria-labelledby="arpeggio-settings-key-title">
             <h3 id="arpeggio-settings-key-title" class="settings-dialog-section-title">Key</h3>
             <div class="settings-key-controls" aria-label="Global arpeggio key controls">
               <button id="arpeggio-settings-key-prev" type="button" class="control-toggle-btn settings-key-step-btn" aria-label="Previous key in circle of fifths">-</button>
               <div class="settings-key-display">
                 <span class="settings-key-value" id="arpeggio-settings-key-value">C</span>
                 <span class="settings-key-caption"></span>
               </div>
               <button id="arpeggio-settings-key-next" type="button" class="control-toggle-btn settings-key-step-btn" aria-label="Next key in circle of fifths">+</button>
             </div>
             <div class="settings-key-transpose" aria-label="Shift selected settings notes within current key">
               <span class="settings-key-transpose-label">Shift selected notes</span>
               <div class="settings-key-transpose-actions">
                 <button id="global-key-transpose-down" type="button" class="control-toggle-btn settings-key-transpose-btn" title="Shift selected settings notes down within the current key">t-</button>
                 <button id="global-key-transpose-up" type="button" class="control-toggle-btn settings-key-transpose-btn" title="Shift selected settings notes up within the current key">t+</button>
               </div>
             </div>
           </section>
           <div class="settings-dialog-actions">
              <div class="settings-dialog-history-actions" aria-label="Stored arpeggio preset navigation">
                <button id="arpeggio-settings-history-prev" type="button" class="control-toggle-btn settings-history-btn" disabled aria-disabled="true">Prev</button>
                 <span id="arpeggio-settings-history-position" class="settings-history-position" aria-live="polite">0 / 0</span>
                <button id="arpeggio-settings-history-next" type="button" class="control-toggle-btn settings-history-btn" disabled aria-disabled="true">Next</button>
              </div>
             <button id="arpeggio-settings-apply" type="button" class="control-toggle-btn settings-apply-btn">Apply</button>
           </div>
         </div>
       </dialog>


      </div>


      <div class="control-group">
        <h3 class="control-group-title">Oscillator</h3>
        <div class="control-group-items">
          <div class="control-item">
            <label for="detune-spread">Detune Spread (<span id="detune-spread-value">3.0</span> cent)</label>
            <input id="detune-spread" type="range" min="0" max="20" step="0.5" value="3">
          </div>
          <div class="control-item">
            <label for="sub-level">Sub Level (<span id="sub-level-value">0.45</span>)</label>
            <input id="sub-level" type="range" min="0" max="1" step="0.01" value="0.45">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3 class="control-group-title">Envelope</h3>
        <div class="control-group-items">
          <div class="control-item">
            <label for="attack">Attack (<span id="attack-value">0.10</span>s)</label>
            <input id="attack" type="range" min="0.001" max="0.3" step="0.001" value="0.1">
          </div>
          <div class="control-item">
            <label for="decay">Decay (<span id="decay-value">0.50</span>s)</label>
            <input id="decay" type="range" min="0.01" max="0.8" step="0.01" value="0.5">
          </div>
          <div class="control-item">
            <label for="release">Release (<span id="release-value">0.08</span>s)</label>
            <input id="release" type="range" min="0.01" max="0.5" step="0.01" value="0.08">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3 class="control-group-title">Filter</h3>
        <div class="control-group-items">
          <div class="control-item">
            <label for="filter-cutoff">Cutoff (<span id="filter-cutoff-value">1600</span> Hz)</label>
            <input id="filter-cutoff" type="range" min="300" max="5000" step="10" value="1600">
          </div>
          <div class="control-item">
            <label for="filter-q">Resonance (<span id="filter-q-value">1.10</span>)</label>
            <input id="filter-q" type="range" min="0.2" max="8" step="0.1" value="1.1">
          </div>
          <div class="control-item">
            <label for="lfo-target">LFO Target (<span id="lfo-target-value">Off</span>)</label>
            <input id="lfo-target" type="range" min="0" max="2" step="1" value="0">
          </div>
          <div class="control-item">
            <label for="lfo-rate">LFO Rate (<span id="lfo-rate-value">1.20 Hz</span>)</label>
            <input id="lfo-rate" type="range" min="0" max="1" step="0.001" value="0.624078">
          </div>
          <div class="control-item">
            <label for="lfo-depth">LFO Depth (<span id="lfo-depth-value">0%</span>)</label>
            <input id="lfo-depth" type="range" min="0" max="1" step="0.01" value="0">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3 class="control-group-title">Post Filter</h3>
        <div class="control-group-items">
          <div class="control-item">
            <label for="post-filter-type">Type (<span id="post-filter-type-value">Off</span>)</label>
            <button id="post-filter-type" type="button" value="0" class="cycle-btn">Cycle Type</button>
          </div>
          <div class="control-item">
            <label for="post-filter-cutoff">Cutoff (<span id="post-filter-cutoff-value">800</span> Hz)</label>
            <input id="post-filter-cutoff" type="range" min="0" max="1" step="0.001" value="0.534">
          </div>
          <div class="control-item">
            <label for="post-filter-q">Resonance (<span id="post-filter-q-value">1.00</span>)</label>
            <input id="post-filter-q" type="range" min="0.1" max="18" step="0.1" value="1">
          </div>
          <div class="control-item">
            <label for="post-filter-mix">Intensity (<span id="post-filter-mix-value">0.50</span>)</label>
            <input id="post-filter-mix" type="range" min="0" max="1" step="0.01" value="0.5">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3 class="control-group-title">Distortion</h3>
        <div class="control-group-items">
          <div class="control-item">
            <label for="distortion-drive">Drive (<span id="distortion-drive-value">0.30</span>)</label>
            <input id="distortion-drive" type="range" min="0" max="1" step="0.01" value="0.3">
          </div>
          <div class="control-item">
            <label for="distortion-mix">Mix (<span id="distortion-mix-value">0.20</span>)</label>
            <input id="distortion-mix" type="range" min="0" max="1" step="0.01" value="0.2">
          </div>
          <div class="control-item">
            <label for="distortion-tone">Tone (<span id="distortion-tone-value">4500</span> Hz)</label>
            <input id="distortion-tone" type="range" min="500" max="12000" step="10" value="4500">
          </div>
          <div class="control-item">
            <label for="distortion-feedback">Feedback (<span id="distortion-feedback-value">0.00</span>)</label>
            <input id="distortion-feedback" type="range" min="0" max="0.35" step="0.01" value="0">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3 class="control-group-title">Send &amp; Pan</h3>
        <div class="control-group-items">
          <div class="control-item">
                <label for="delay-send">Tape Delay Send (<span id="delay-send-value">0.10</span>)</label>
            <input id="delay-send" type="range" min="0" max="0.10" step="0.01" value="0.10">
          </div>
              <div class="control-item">
                <label for="clean-delay-send">Clean Delay Send (<span id="clean-delay-send-value">0.00</span>)</label>
                <input id="clean-delay-send" type="range" min="0" max="0.6" step="0.01" value="0">
              </div>
          <div class="control-item">
            <label for="reverb-send">Reverb Send (<span id="reverb-send-value">0.24</span>)</label>
            <input id="reverb-send" type="range" min="0" max="0.8" step="0.01" value="0.24">
          </div>
          <div class="control-item">
            <label for="stereo-pan">Stereo Pan (<span id="stereo-pan-value">0.00</span>)</label>
            <input id="stereo-pan" type="range" min="-1" max="1" step="0.01" value="0">
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="js/app.js"></script>
</body>

</html>
